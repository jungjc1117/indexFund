<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>증시 실시간 모니터링 (Day Focus)</title>
    <style>
        body {
            margin: 0;
            padding: 0px;
            background-color: #f4f4f4;
            color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 상단 바 */
        .top-bar {
            width: 100%;
            height: 30px; /* 높이를 약간 조절하여 가독성 확보 */
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .label-foreign { color: #ff9900; font-weight: bold; font-size: 0.85rem; margin-right: 15px; }
        .label-institution { color: #1976d2; font-weight: bold; font-size: 0.85rem; }
        #last-update { 
            position: absolute; 
            bottom: 2px; 
            right: 10px; 
            font-size: 9px; 
            color: #666; 
        }

        /* 4x1 수직 배열 컨테이너 */
        .grid-wrapper {
            display: grid;
            grid-template-columns: 1fr; /* 1열 구조 */
            gap: 8px; /* 차트 사이 간격 */
            max-width: 600px; /* 1열이므로 너비 제한 */
            margin: 0 auto;
            padding: 8px;
        }

        /* 차트 개별 박스 */
        .chart-container {
            background: #ffffff;
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chart-header {
            padding: 6px 12px;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            background: #f8f8f8;
            border-bottom: 1px solid #eee;
        }

        .chart-img-wrapper {
            background-color: #fff;
            min-height: 150px;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <span class="label-foreign">● 외국인</span>
        <span class="label-institution">● 기관</span>
        <div id="last-update">대기 중...</div>
    </div>    

    <div class="grid-wrapper">
     

        <div class="chart-container">
            <div class="chart-header">KOSPI (Day)</div>
            <div class="chart-img-wrapper"><img id="chart-kospi" src=""></div>
        </div>

        <div class="chart-container">
            <div class="chart-header">KOSDAQ (Day)</div>
            <div class="chart-img-wrapper"><img id="chart-kosdaq" src=""></div>
        </div>
        
        <div class="chart-container">
            <div class="chart-header">S&P 500 (Day)</div>
            <div class="chart-img-wrapper"><img id="chart-sp500" src=""></div>
        </div>

        <div class="chart-container">
            <div class="chart-header">NASDAQ (Day)</div>
            <div class="chart-img-wrapper"><img id="chart-nasdaq" src=""></div>
        </div>
    </div>

    <script>
        const chartData = [
            { id: 'chart-sp500', url: 'https://t1.daumcdn.net/media/finance/chart/us/stock/d/SP500.png' },
            { id: 'chart-nasdaq', url: 'https://t1.daumcdn.net/media/finance/chart/us/stock/d/COMP.png' },
            { id: 'chart-kospi', url: 'https://ssl.pstatic.net/imgfinance/chart/sise/siseMainKOSPI.png' },
            { id: 'chart-kosdaq', url: 'https://ssl.pstatic.net/imgfinance/chart/sise/siseMainKOSDAQ.png' }
        ];

        function refreshCharts() {
            const timestamp = Date.now();
            chartData.forEach(item => {
                const imgElement = document.getElementById(item.id);
                const newImg = new Image();
                newImg.src = item.url + "?t=" + timestamp;
                newImg.onload = function() {
                    imgElement.src = this.src;
                };
            });

            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0') + ":" + 
                            now.getSeconds().toString().padStart(2, '0');
            document.getElementById('last-update').innerText = "Update: " + timeStr;
        }

        // 10초마다 자동 갱신
        setInterval(refreshCharts, 10000);
        window.onload = refreshCharts;
    </script>
</body>
</html>
