<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>증시 모니터링 & eSignal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 상단 바 */
        .top-bar {
            width: 100%;
            height: 35px;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .label-group { font-size: 0.85rem; font-weight: bold; }
        .label-foreign { color: #ff9900; margin-right: 15px; }
        .label-institution { color: #1976d2; }
        #last-update { position: absolute; right: 10px; font-size: 10px; color: #666; }

        /* 메인 레이아웃 컨테이너 */
        .main-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 10px;
        }

        /* 차트 격자 (4x1) */
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .chart-box {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            overflow: hidden;
        }

        .chart-header {
            padding: 8px 12px;
            font-size: 13px;
            font-weight: bold;
            background: #eee;
            border-bottom: 1px solid #ddd;
        }

        .chart-img-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 외부 사이트(eSignal) 컨테이너 */
        .external-site-container {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 10px;
        }

        .iframe-wrapper {
            width: 100%;
            height: 1300px; /* 사이트를 보여줄 높이 설정 */
            border: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="label-group">
            <span class="label-foreign">● 외국인</span>
            <span class="label-institution">● 기관</span>
        </div>
        <div id="last-update">대기 중...</div>
    </div>    

    <div class="main-container">
        <div class="chart-grid">
            <div class="chart-box">
                <div class="chart-header">KOSPI (Day)</div>
                <div class="chart-img-wrapper"><img id="chart-kospi" src=""></div>
            </div>
            <div class="chart-box">
                <div class="chart-header">KOSDAQ (Day)</div>
                <div class="chart-img-wrapper"><img id="chart-kosdaq" src=""></div>
            </div>
            
            <div class="chart-box">
                <div class="chart-header">S&P 500 (Day)</div>
                <div class="chart-img-wrapper"><img id="chart-sp500" src=""></div>
            </div>
            <div class="chart-box">
                <div class="chart-header">NASDAQ (Day)</div>
                <div class="chart-img-wrapper"><img id="chart-nasdaq" src=""></div>
            </div>

        </div>

        <div class="external-site-container">
            <div class="chart-header">eSignal 실시간 정보</div>
            <div class="iframe-wrapper">
                <iframe src="https://esignal.co.kr/" title="eSignal Korea"></iframe>
            </div>
        </div>
    </div>

    <script>
        const chartData = [
            { id: 'chart-sp500', url: 'https://t1.daumcdn.net/media/finance/chart/us/stock/d/SP500.png' },
            { id: 'chart-nasdaq', url: 'https://t1.daumcdn.net/media/finance/chart/us/stock/d/COMP.png' },
            { id: 'chart-kospi', url: 'https://ssl.pstatic.net/imgfinance/chart/sise/siseMainKOSPI.png' },
            { id: 'chart-kosdaq', url: 'https://ssl.pstatic.net/imgfinance/chart/sise/siseMainKOSDAQ.png' }
        ];

        function refreshCharts() {
            const timestamp = Date.now();
            chartData.forEach(item => {
                const imgElement = document.getElementById(item.id);
                const newImg = new Image();
                newImg.src = item.url + "?t=" + timestamp;
                newImg.onload = function() {
                    imgElement.src = this.src;
                };
            });

            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0') + ":" + 
                            now.getSeconds().toString().padStart(2, '0');
            document.getElementById('last-update').innerText = "Update: " + timeStr;
        }

        setInterval(refreshCharts, 10000);
        window.onload = refreshCharts;
    </script>
</body>
</html>
